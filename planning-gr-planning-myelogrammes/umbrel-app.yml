releaseNotes: >-
  Activation différée des plannings : un planning validé ne passe « en
  cours » qu'à sa date de début. Vous pouvez préparer le planning suivant
  à l'avance — il coexiste en « à venir » avec la période en cours et
  démarre automatiquement le jour venu. L'équilibrage du nouveau planning
  tient désormais compte du décompte théorique des périodes non archivées
  (en plus de l'historique). Nouveau récap réel / théorique par personne.
  Archivage automatique en fin de période.
