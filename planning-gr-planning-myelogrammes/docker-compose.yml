services:
  app_proxy:
    environment:
      APP_HOST: planning-gr-planning-myelogrammes_web_1
      APP_PORT: 3000

  web:
    image: ghcr.io/asdggr/planning-myelogrammes:v0.13.0
    restart: on-failure
    environment:
      PORT: 3000
      DATA_DIR: /data
      # Snapshots locaux horodatés conservés dans /data/backups/ (0 = désactivé).
      BACKUP_KEEP: "30"
    volumes:
      - ${APP_DATA_DIR}/data:/data
