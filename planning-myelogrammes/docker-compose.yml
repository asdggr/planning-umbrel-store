version: "3.7"

services:
  app_proxy:
    environment:
      APP_HOST: planning-myelogrammes_web_1
      APP_PORT: 3000

  web:
    image: ghcr.io/asdggr/planning-myelogrammes:v0.1.0
    restart: on-failure
    environment:
      PORT: 3000
      DATA_DIR: /data
    volumes:
      - ${APP_DATA_DIR}/data:/data
