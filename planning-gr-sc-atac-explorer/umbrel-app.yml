  1.0.2 — accès sans login Umbrel (PROXY_AUTH_ADD=false) : l'accès est protégé
  par Tailscale (partage de nœud + ACL au port), pour le partage aux
  collaborateurs. 1.0.1 — 3 UMAP de référence dans l'onglet TF explorer.
