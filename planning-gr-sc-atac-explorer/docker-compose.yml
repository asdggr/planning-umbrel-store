# Code-only PUBLIC image (R + shiny + the app, NO data) → Umbrel pulls it from
# ghcr without any PAT. The unpublished data is mounted from the Umbrel app
# volume at /data (see deploy/ship_data.sh) and never enters the registry.
services:
  app_proxy:
    environment:
      APP_HOST: planning-gr-sc-atac-explorer_web_1
      APP_PORT: 3838

  web:
    image: ghcr.io/asdggr/sc-atac-explorer:1.0.0
    restart: on-failure
    environment:
      DATA_DIR: /data
    volumes:
      - ${APP_DATA_DIR}/data:/data
    stop_grace_period: 1m
