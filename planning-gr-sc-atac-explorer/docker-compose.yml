version: "3.7"

# Image hosted on a PRIVATE ghcr.io package (carries unpublished data — keep it
# private). The Umbrel must be authenticated to ghcr to pull it (docker login
# ghcr.io once on the host, same as the planning app).
services:
  app_proxy:
    environment:
      APP_HOST: planning-gr-sc-atac-explorer_web_1
      APP_PORT: 3838

  web:
    image: ghcr.io/asdggr/sc-atac-explorer:1.0.0
    restart: on-failure
    stop_grace_period: 1m
